<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Self-hosted link manager">
    <meta name="theme-color" content="#ffffff">
    <title>ctrlTAB</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/favicon.svg">
    <link rel="apple-touch-icon" href="icons/ctrltab-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bebas+Neue&display=swap">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="themes/cyberpunk/cyberpunk.css">
    <link rel="stylesheet" href="themes/batman/batman.css">
    <link rel="stylesheet" href="themes/oled/oled.css">
    <script>
        // Apply theme and background before render to prevent flash
        (function() {
            var th = localStorage.getItem('ctrltab-theme');
            if (th && th !== 'light') document.documentElement.dataset.theme = th;
            var bg = localStorage.getItem('ctrltab-bg');
            if (bg) {
                document.documentElement.style.setProperty('--user-bg', 'url("' + bg + '")');
                document.documentElement.classList.add('has-user-bg');
                if (localStorage.getItem('ctrltab-bg-dim') !== '0') {
                    document.documentElement.classList.add('has-user-bg-dim');
                }
            }
        })();
    </script>
</head>
<body>
    <!-- Cyberpunk grid background -->
    <div class="grid-background"></div>

    <!-- Scan lines overlay -->
    <div class="scan-lines"></div>

    <!-- Main container -->
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo" onclick="goHome()" data-i18n-title="nav.home_tooltip" title="Go to last collection">
                    <div class="logo-text">ctrl<span class="logo-accent">TAB</span></div>
                </div>
                <div class="subtitle" data-i18n="nav.subtitle">Link Manager</div>
            </div>

            <div class="collections-container">
                <div class="search-wrapper">
                    <input
                        type="search"
                        id="searchInput"
                        class="search-input"
                        placeholder="Search links..."
                        autocomplete="off"
                        oninput="handleSearchInput(this.value)"
                        onkeydown="if(event.key==='Enter') openFirstSearchResult()"
                        data-i18n-placeholder="nav.search_placeholder"
                    >
                    <button class="search-clear-btn" id="searchClearBtn" style="display:none;" onclick="clearSearch()" title="Clear search" aria-label="Clear search" data-i18n-title="nav.search_clear">
                        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                            <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <div class="collections-header">
                    <span class="label" data-i18n="nav.collections_label">Collections</span>
                    <button class="btn-icon" id="addCollectionBtn" title="Add collection" data-i18n-title="btn.add_collection">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <ul class="collections-list" id="collectionsList">
                    <!-- Collections will be loaded here -->
                </ul>
            </div>

            <img class="bat-silhouette" src="themes/batman/assets/batman-silhouette.svg" alt="">

            <div class="sidebar-footer">
                <button class="settings-btn" id="settingsBtn" data-i18n-aria="nav.settings">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M13.05 10.13a1.14 1.14 0 0 0 .23 1.26l.04.04a1.38 1.38 0 1 1-1.96 1.96l-.04-.04a1.14 1.14 0 0 0-1.26-.23 1.14 1.14 0 0 0-.69 1.05v.11a1.38 1.38 0 1 1-2.76 0v-.06a1.14 1.14 0 0 0-.75-1.05 1.14 1.14 0 0 0-1.26.23l-.04.04a1.38 1.38 0 1 1-1.96-1.96l.04-.04a1.14 1.14 0 0 0 .23-1.26 1.14 1.14 0 0 0-1.05-.69h-.11a1.38 1.38 0 1 1 0-2.76h.06a1.14 1.14 0 0 0 1.05-.75 1.14 1.14 0 0 0-.23-1.26l-.04-.04a1.38 1.38 0 1 1 1.96-1.96l.04.04a1.14 1.14 0 0 0 1.26.23h.06a1.14 1.14 0 0 0 .69-1.05v-.11a1.38 1.38 0 1 1 2.76 0v.06a1.14 1.14 0 0 0 .69 1.05 1.14 1.14 0 0 0 1.26-.23l.04-.04a1.38 1.38 0 1 1 1.96 1.96l-.04.04a1.14 1.14 0 0 0-.23 1.26v.06a1.14 1.14 0 0 0 1.05.69h.11a1.38 1.38 0 1 1 0 2.76h-.06a1.14 1.14 0 0 0-1.05.69Z" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    <span data-i18n="nav.settings">Settings</span>
                </button>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <div class="content-header">
                <div class="collection-title-container">
                    <button class="btn-icon settings-back-btn" id="settingsBackBtn" style="display: none;" title="Back" data-i18n-title="btn.back">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <h2 class="collection-title" id="collectionTitle">ctrlTAB</h2>
                    <div class="collection-actions">
                        <button class="btn-icon" id="editCollectionBtn" title="Edit collection" style="display: none;">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M11.333 2A1.886 1.886 0 0 1 14 4.667l-9 9-3.667 1 1-3.667 9-9Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="btn-primary" id="addSectionBtn" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span data-i18n="btn.add_section">Add Section</span>
                </button>
            </div>

            <div class="sections-container" id="sectionsContainer"></div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Modal Title</h3>
                <button class="btn-icon" id="modalClose">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Cyberpunk theme transition overlay -->
    <div id="glitchOverlay"></div>

    <!-- Batman cinematic intro (10s boot sequence) -->
    <div id="batman-intro">
        <div class="bi-grain"></div>
        <div class="bi-thunder"></div>
        <div class="bi-lightning"></div>
        <div class="bi-skyline"></div>
        <div class="bi-signal"></div>
        <div class="bi-flash"></div>
        <div class="bi-vignette"></div>
    </div>

    <script src="i18n.js"></script>
    <script src="app.js"></script>
</body>
</html>
